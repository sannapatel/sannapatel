<svg width="100%" viewBox="0 0 680 200" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Sanjana N Patel D — terminal style animated banner</title>
<desc>Dark terminal aesthetic with typing animation and scan line effect</desc>
<defs>
  <clipPath id="clip"><rect width="680" height="200" rx="10"/></clipPath>
  <clipPath id="termclip"><rect x="0" y="0" width="680" height="200"/></clipPath>
</defs>
<g clip-path="url(#clip)">

  <!-- Terminal dark background -->
  <rect width="680" height="200" fill="#0d1117"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="40" x2="680" y2="40" stroke="#f9d06b" stroke-width="0.2" opacity="0.12"/>
  <line x1="0" y1="80" x2="680" y2="80" stroke="#f9d06b" stroke-width="0.2" opacity="0.12"/>
  <line x1="0" y1="120" x2="680" y2="120" stroke="#f9d06b" stroke-width="0.2" opacity="0.12"/>
  <line x1="0" y1="160" x2="680" y2="160" stroke="#f9d06b" stroke-width="0.2" opacity="0.12"/>
  <line x1="170" y1="0" x2="170" y2="200" stroke="#f9d06b" stroke-width="0.2" opacity="0.08"/>
  <line x1="340" y1="0" x2="340" y2="200" stroke="#f9d06b" stroke-width="0.2" opacity="0.08"/>
  <line x1="510" y1="0" x2="510" y2="200" stroke="#f9d06b" stroke-width="0.2" opacity="0.08"/>

  <!-- Scanline sweep -->
  <rect x="0" y="0" width="680" height="6" fill="#f9d06b" opacity="0.04"
    style="animation: scanline 4s linear infinite;"/>

  <!-- Terminal top bar -->
  <rect x="0" y="0" width="680" height="28" fill="#161b22"/>
  <circle cx="18" cy="14" r="5" fill="#ff5f57"/>
  <circle cx="34" cy="14" r="5" fill="#febc2e"/>
  <circle cx="50" cy="14" r="5" fill="#28c840"/>
  <text x="340" y="19" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="11" fill="#8b949e">
    sanjanan1035 ~ terminal
  </text>

  <!-- Prompt line -->
  <text x="24" y="62"
    font-family="'Courier New', monospace" font-size="13" fill="#f9d06b" opacity="0.7">
    visitor@github:~$
  </text>
  <text x="168" y="62"
    font-family="'Courier New', monospace" font-size="13" fill="#e6edf3">
    whoami
  </text>

  <!-- Output: name types in -->
  <text x="24" y="90"
    font-family="'Courier New', monospace" font-size="22" font-weight="bold" fill="#f9d06b"
    style="animation: fadeIn 0.5s ease 0.3s both;">
    Sanjana N Patel D
  </text>

  <!-- Cursor after name -->
  <rect x="258" y="72" width="11" height="20" fill="#f9d06b"
    style="animation: blink 1s step-end infinite 0.8s, fadeIn 0.1s ease 0.8s both;"/>

  <!-- Second prompt -->
  <text x="24" y="120"
    font-family="'Courier New', monospace" font-size="13" fill="#f9d06b" opacity="0.7"
    style="animation: fadeIn 0.3s ease 1.2s both; opacity: 0;">
    visitor@github:~$
  </text>
  <text x="168" y="120"
    font-family="'Courier New', monospace" font-size="13" fill="#e6edf3"
    style="animation: fadeIn 0.3s ease 1.4s both; opacity: 0;">
    cat about.txt
  </text>

  <!-- Cycling role output -->
  <text x="24" y="148" font-family="'Courier New', monospace" font-size="13" fill="#79c0ff"
    style="animation: role1 18s ease 1.8s infinite; opacity: 0;">
    &gt; Cybersecurity student | Threat hunter | Web dev
  </text>
  <text x="24" y="148" font-family="'Courier New', monospace" font-size="13" fill="#56d364"
    style="animation: role2 18s ease 1.8s infinite; opacity: 0;">
    &gt; CTF competitor | 6+ competitions and counting 🚩
  </text>
  <text x="24" y="148" font-family="'Courier New', monospace" font-size="13" fill="#f78166"
    style="animation: role3 18s ease 1.8s infinite; opacity: 0;">
    &gt; Published researcher | SIEM &amp; threat detection 📄
  </text>
  <text x="24" y="148" font-family="'Courier New', monospace" font-size="13" fill="#e3b341"
    style="animation: role4 18s ease 1.8s infinite; opacity: 0;">
    &gt; TryHackMe top 15% | Rank [0x7] ADEPT 🏆
  </text>

  <!-- Third prompt blinking at bottom -->
  <text x="24" y="178"
    font-family="'Courier New', monospace" font-size="13" fill="#f9d06b" opacity="0.7"
    style="animation: fadeIn 0.3s ease 2.2s both; opacity: 0;">
    visitor@github:~$
  </text>
  <rect x="168" y="163" width="9" height="17" fill="#e6edf3" opacity="0.8"
    style="animation: blink 1s step-end infinite 2.2s, fadeIn 0.1s ease 2.2s both;"/>

  <!-- Right corner: TryHackMe rank badge -->
  <rect x="548" y="148" width="118" height="34" rx="4" fill="#161b22" stroke="#f9d06b" stroke-width="0.8" opacity="0.9"
    style="animation: fadeIn 0.4s ease 2s both; opacity: 0;"/>
  <text x="607" y="162" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="9" fill="#f9d06b" opacity="0.6"
    style="animation: fadeIn 0.4s ease 2s both; opacity: 0;">
    TRYHACKME
  </text>
  <text x="607" y="176" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="11" font-weight="bold" fill="#f9d06b"
    style="animation: fadeIn 0.4s ease 2s both; opacity: 0;">
    [0x7] ADEPT
  </text>

</g>

<style>
  @keyframes scanline {
    0%   { transform: translateY(-6px); opacity: 0; }
    5%   { opacity: 0.06; }
    95%  { opacity: 0.06; }
    100% { transform: translateY(200px); opacity: 0; }
  }
  @keyframes blink {
    0%,100% { opacity: 0.9; }
    50%     { opacity: 0; }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes role1 {
    0%        { opacity: 0; }
    2%        { opacity: 1; }
    23%       { opacity: 1; }
    25%       { opacity: 0; }
    100%      { opacity: 0; }
  }
  @keyframes role2 {
    0%,25%    { opacity: 0; }
    27%       { opacity: 1; }
    48%       { opacity: 1; }
    50%       { opacity: 0; }
    100%      { opacity: 0; }
  }
  @keyframes role3 {
    0%,50%    { opacity: 0; }
    52%       { opacity: 1; }
    73%       { opacity: 1; }
    75%       { opacity: 0; }
    100%      { opacity: 0; }
  }
  @keyframes role4 {
    0%,75%    { opacity: 0; }
    77%       { opacity: 1; }
    98%       { opacity: 1; }
    100%      { opacity: 0; }
  }
</style>
</svg>
