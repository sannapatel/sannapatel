<svg width="100%" viewBox="0 0 680 200" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Sanjana N Patel D — Cybersecurity Student animated banner</title>
<desc>Static summer banner with typing animation cycling through roles</desc>
<defs>
  <clipPath id="clip"><rect width="680" height="200" rx="12"/></clipPath>
  <linearGradient id="gSummer" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#f9d06b"/>
    <stop offset="100%" stop-color="#f98b4a"/>
  </linearGradient>
</defs>
<g clip-path="url(#clip)">

  <!-- Static summer background -->
  <rect width="680" height="200" fill="url(#gSummer)"/>

  <!-- Decorative blobs -->
  <ellipse cx="580" cy="170" rx="220" ry="90" opacity="0.15" fill="#ffffff" style="animation: wavePulse 6s ease-in-out infinite alternate;"/>
  <ellipse cx="100" cy="30" rx="180" ry="70" opacity="0.10" fill="#ffffff" style="animation: wavePulse 8s ease-in-out infinite alternate-reverse;"/>

  <!-- Floating particles -->
  <circle cx="80"  cy="40"  r="3"   fill="#fff" opacity="0.7" style="animation: drift 7s ease-in-out infinite alternate;"/>
  <circle cx="200" cy="70"  r="2"   fill="#fff" opacity="0.5" style="animation: drift 5s ease-in-out infinite alternate-reverse;"/>
  <circle cx="350" cy="28"  r="2.5" fill="#fff" opacity="0.6" style="animation: drift 7s ease-in-out infinite alternate;"/>
  <circle cx="480" cy="55"  r="3"   fill="#fff" opacity="0.4" style="animation: drift 5s ease-in-out infinite alternate-reverse;"/>
  <circle cx="600" cy="42"  r="2"   fill="#fff" opacity="0.7" style="animation: drift 7s ease-in-out infinite alternate;"/>
  <circle cx="150" cy="150" r="2"   fill="#fff" opacity="0.4" style="animation: drift 5s ease-in-out infinite alternate-reverse;"/>
  <circle cx="530" cy="155" r="3"   fill="#fff" opacity="0.5" style="animation: drift 7s ease-in-out infinite alternate;"/>
  <circle cx="640" cy="110" r="2"   fill="#fff" opacity="0.6" style="animation: drift 5s ease-in-out infinite alternate-reverse;"/>
  <circle cx="40"  cy="110" r="2.5" fill="#fff" opacity="0.5" style="animation: drift 7s ease-in-out infinite alternate;"/>
  <circle cx="300" cy="165" r="2"   fill="#fff" opacity="0.4" style="animation: drift 5s ease-in-out infinite alternate-reverse;"/>

  <!-- Name — static, always visible -->
  <text x="340" y="88"
    text-anchor="middle"
    font-family="'Segoe UI', Georgia, sans-serif"
    font-size="42" font-weight="700" letter-spacing="2"
    fill="#ffffff">Sanjana N Patel D</text>

  <!-- Typing lines — each phrase fades in/out in sequence -->
  <!-- Line 1 -->
  <text x="340" y="128" text-anchor="middle"
    font-family="'Segoe UI', monospace" font-size="14" letter-spacing="2.5" fill="#ffffff"
    style="animation: line1 15s infinite;">
    Cybersecurity Student · Threat Hunter · Researcher
  </text>

  <!-- Line 2 -->
  <text x="340" y="128" text-anchor="middle"
    font-family="'Segoe UI', monospace" font-size="14" letter-spacing="2.5" fill="#ffffff"
    style="animation: line2 15s infinite;">
    🚩 CTF Competitor · 6+ Competitions &amp; Counting
  </text>

  <!-- Line 3 -->
  <text x="340" y="128" text-anchor="middle"
    font-family="'Segoe UI', monospace" font-size="14" letter-spacing="2.5" fill="#ffffff"
    style="animation: line3 15s infinite;">
  </text>

  <!-- Line 4 -->
  <text x="340" y="128" text-anchor="middle"
    font-family="'Segoe UI', monospace" font-size="14" letter-spacing="2.5" fill="#ffffff"
    style="animation: line4 15s infinite;">
    📄 Published Researcher · SIEM &amp; Threat Detection
  </text>

  <!-- Blinking cursor bar -->
  <rect x="338" y="133" width="2" height="14" fill="#ffffff" opacity="0.9"
    style="animation: blink 1s step-end infinite;"/>

  <!-- Decorative line -->
  <line x1="200" y1="148" x2="480" y2="148" stroke="#ffffff" stroke-width="0.7" opacity="0.35"/>

  <!-- SUMMER label -->
  <text x="640" y="185" text-anchor="end"
    font-family="'Segoe UI', sans-serif"
    font-size="11" font-weight="500" letter-spacing="2"
    fill="#ffffff" opacity="0.45">SUMMER</text>

</g>
<style>
  @keyframes wavePulse {
    from { transform: scale(1); opacity: 0.15; }
    to   { transform: scale(1.07) translateX(-18px); opacity: 0.22; }
  }
  @keyframes drift {
    from { transform: translateY(0px) translateX(0px); }
    to   { transform: translateY(-16px) translateX(10px); }
  }
  @keyframes blink {
    0%,100% { opacity: 0.9; }
    50%     { opacity: 0; }
  }

  /* 4 lines, 20s total, each visible for 5s */
  /* fade in 0.4s, hold, fade out 0.4s */

  @keyframes line1 {
    0%      { opacity: 0; }
    2%      { opacity: 1; }
    31%     { opacity: 1; }
    34%     { opacity: 0; }
    100%    { opacity: 0; }
  }
  @keyframes line2 {
    0%,34%  { opacity: 0; }
    36%     { opacity: 1; }
    65%     { opacity: 1; }
    67%     { opacity: 0; }
    100%    { opacity: 0; }
  }
  @keyframes line3 {
    0%,67%  { opacity: 0; }
    69%     { opacity: 1; }
    98%     { opacity: 1; }
    100%    { opacity: 0; }
  }
  @keyframes line4 {
    0%      { opacity: 0; }
    100%    { opacity: 0; }
  }
</style>
</svg>
